<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchovies Wordle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="identityGate" class="identity-gate" hidden>
      <div class="identity-card">
        <span class="pixel-badge">Anchovies Wordle</span>
        <h1>Who are you?</h1>
        <div id="identityButtons" class="identity-buttons"></div>
      </div>
    </div>

    <main class="app-shell">
      <section class="score-panel">
        <div class="brand-block">
          <span class="pixel-badge">Anchovies Wordle</span>
        </div>

        <div class="player-card">
          <label>Playing as</label>
          <div class="player-row">
            <button id="emojiButton" class="emoji-button" type="button" aria-label="Choose emoji">😀</button>
            <strong id="currentPlayerName" class="player-name-pill">Player</strong>
          </div>
          <div id="emojiGrid" class="emoji-grid" hidden></div>
          <button id="homeButton" class="home-button" type="button">Home</button>
        </div>

        <div class="leaderboard">
          <div class="panel-heading">
            <h2>Party Board</h2>
          </div>
          <div id="leaderboardList" class="leaderboard-list"></div>
        </div>
      </section>

      <section class="game-panel">
        <header class="game-header">
          <span id="dayLabel" class="pixel-badge">The Board</span>
          <div class="header-actions">
            <div class="doodle-tool">
              <button id="pencilToggle" class="tool-button icon-tool" type="button" aria-label="Doodle tools" aria-pressed="false">✎</button>
              <div id="doodleMenu" class="doodle-menu" hidden>
                <div id="colorSwatches" class="color-swatches" aria-label="Doodle colors"></div>
                <button id="clearDoodlesButton" class="tool-button" type="button">Clear</button>
              </div>
            </div>
            <button id="hintButton" type="button">Hint costs 1 turn</button>
            <button id="resetGameButton" type="button">New game</button>
          </div>
        </header>

        <div id="gamePlayArea" class="game-play-area">
          <canvas id="doodleCanvas" class="doodle-canvas" aria-label="Team doodle canvas"></canvas>
          <div id="hintBox" class="hint-box" hidden></div>
          <div id="answerBox" class="answer-box" hidden></div>
          <div id="board" class="board" aria-label="Wordle board"></div>
          <div id="keyboard" class="keyboard" aria-label="Keyboard"></div>
        </div>

        <article id="articlePanel" class="article-panel" hidden>
          <div class="article-panel-copy">
            <span id="articleSource" class="pixel-badge">Headlines</span>
            <h2 id="articleTitle"></h2>
            <p id="articleSummary"></p>
            <a id="articleLink" class="article-link" href="#" target="_blank" rel="noopener">Read full story</a>
          </div>
          <img id="articleImage" alt="" hidden />
          <button id="articleCloseButton" type="button">Back to board</button>
        </article>
      </section>

      <section class="news-ticker" aria-label="Headlines and weather">
        <div id="weatherBadge" class="ticker-label ticker-weather" aria-live="polite">
          <div class="weather-face weather-now">
            <span id="weatherPlace">Denver</span>
            <strong id="weatherTemp">--°</strong>
            <small id="weatherCondition">Weather</small>
          </div>
          <div class="weather-face weather-range">
            <span id="weatherRangePlace">Denver</span>
            <strong><span id="weatherHigh">--°</span>/<span id="weatherLow">--°</span></strong>
            <small>High / low</small>
          </div>
          <button id="triviaToggle" class="weather-face trivia-face" type="button" aria-label="Reveal trivia answer">
            <strong id="triviaQuestion">Loading...</strong>
            <small id="triviaAnswer" hidden></small>
          </button>
        </div>
        <div class="ticker-window">
          <div id="headlineTrack" class="ticker-track">
            <span>Loading headlines...</span>
          </div>
        </div>
        <div id="headlinePreview" class="headline-preview" hidden></div>
      </section>
    </main>

    <script src="./valid-words.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
